name: Run Azalyst Stock Intelligence
on:
  push:
    branches: [ master ]
    paths-ignore:
      - "paper_trades.db"
      - "status.json"
  schedule:
    # Market hours: every hour (14:00 to 21:00) UTC Mon-Fri
    - cron: "0 14-21 * * 1-5"
    # After hours: every 4 hours UTC Mon-Fri
    - cron: "0 22,2,6,10 * * 1-5"
    # Weekends: every 6 hours
    - cron: "0 0,6,12,18 * * 0,6"
  workflow_dispatch:
concurrency:
  group: azalyst-run
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Azalyst Stock Engine
        continue-on-error: true
        run: python azalyst.py
      - name: Generate dashboard
        run: python generate_dashboard.py
      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add -f paper_trades.db status.json || true
          git diff --staged --quiet && echo "no state changes" && exit 0 || true
          git commit -m "chore: update portfolio and state [skip ci]"
          for attempt in 1 2 3 4 5; do
            if git push origin master; then
              echo "push succeeded on attempt $attempt"
              break
            fi
            echo "push attempt $attempt rejected — pulling with rebase"
            git pull --rebase --autostash origin master || { echo "rebase failed"; exit 1; }
            sleep $((attempt * 2))
          done
      - name: Deploy dashboard to GitHub Pages
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          tmpdir="$(mktemp -d)"
          cp index.html "$tmpdir/index.html"
          cp status.json "$tmpdir/status.json"

          git fetch origin gh-pages 2>/dev/null || true
          git checkout --orphan gh-pages-deploy
          git reset --hard
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp "$tmpdir/index.html" .
          cp "$tmpdir/status.json" .
          touch .nojekyll
          git add index.html status.json .nojekyll
          git commit -m "deploy: dashboard update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin gh-pages-deploy:gh-pages --force
